<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batman OS</title>

<style>
body{
    margin:0;
    background:#000;
    color:#39ff14;
    font-family:Consolas,monospace;
    overflow:hidden;
}

#terminal{
    padding:25px;
    white-space:pre-wrap;
    font-size:16px;
    height:100vh;
    overflow-y:auto;
}

button{
    background:#39ff14;
    color:black;
    border:none;
    padding:12px 22px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>

terminal.scrollTop=terminal.scrollHeight;

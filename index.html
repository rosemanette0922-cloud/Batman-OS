<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batman OS</title>

<style>
body{
    margin:0;
    background:#000;
    color:#39ff14;
    font-family:Consolas,monospace;
    overflow:hidden;
}

#terminal{
    padding:25px;
    white-space:pre-wrap;
    font-size:16px;
    height:100vh;
    overflow-y:auto;
}

button{
    background:#39ff14;
    color:black;
    border:none;
    padding:12px 22px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>

const terminal=document.getElementById("terminal");

const lines=[

"WAYNE ENTERPRISES",

"",

"BATCOMPUTER OS v2.0",

"",

"════════════════════════════",

"",

"$ sudo boot BatmanOS",

"",

"Loading Wayne Enterprise Systems...",

"Loading Batcomputer...",

"Connecting to Gotham Servers...",

"Checking Secure Files...",

"Decrypting Memories...",

"",

"████████████████████ 100%",

"",

"✓ Identity Verified",

"",

"ACCESS GRANTED",

"",

"> Welcome back Batman 🦇",

"",

"Running Diagnostics...",

"",

"Exam Stress.............. DETECTED 📚",

"Three Wheel............. UNDER REPAIR 🛺",

"Family Pressure......... HIGH",

"status............ MARRIED",

"Strength................ MAXIMUM 💪",

"Heart................... RESERVED ❤️",

"",

"Searching for happiness...",

"",

"FOUND ❤️",

"",

"Favourite Person........ CHUTI BBH 🐉",

"",

"1 encrypted file detected.",

"",

"love_letter.txt",

"",

"Status : READY"

];
let i=0;

function typeLine(){

    if(i<lines.length){

        terminal.innerHTML+=lines[i]+"<br>";

terminal.scrollTop=terminal.scrollHeight;

        i++;

        setTimeout(typeLine,400);

    }

    else{

        const btn=document.createElement("button");

        btn.innerHTML="🔐 Decrypt File";

        btn.onclick=function(){

            alert("Batman OS Part 2 Coming Soon 🌌");

        };

        terminal.appendChild(btn);

    }

}

typeLine();

</script>

</body>
</html>

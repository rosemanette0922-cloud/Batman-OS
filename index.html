<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Batman OS v2.0</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#39ff14;
    font-family:Consolas,monospace;
    overflow:hidden;
}

#terminal{
    width:100%;
    height:100vh;
    overflow-y:auto;
    padding:25px;
    white-space:pre-wrap;
    font-size:16px;
    line-height:1.7;
}

button{
    background:#39ff14;
    color:#000;
    border:none;
    padding:12px 24px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    margin-top:25px;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.fade{
    animation:fade 1.5s;
}

@keyframes fade{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }

}

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{

    50%{
        opacity:0;
    }

}

</style>

</head>

<body>

<div id="terminal"></div>

<script>

const terminal=document.getElementById("terminal");

const lines=[

"WAYNE ENTERPRISES",
"",
"BATCOMPUTER OS v2.0",
"",
"══════════════════════════════",
"",
"$ sudo boot BatmanOS",
"",
"Loading Wayne Enterprise Systems...",
"Loading Batcomputer...",
"Connecting to Gotham Servers...",
"Checking Secure Files...",
"Decrypting Memories...",
"",
"████████████████████ 100%",
"",
"✓ Identity Verified",
"",
"ACCESS GRANTED",
"",
"> Welcome back Batman 🦇",
"",
"Running Diagnostics...",
"",
"Exam Stress.............. DETECTED 📚",
"Three Wheel............. UNDER REPAIR 🛺",
"Family Pressure......... HIGH",
"Status.................. MARRIED 💍",
"Strength................ MAXIMUM 💪",
"Heart................... RESERVED ❤️",
"",
"Searching for happiness...",
"",
"FOUND ❤️",
"",
"Favourite Person........ CHUTI BBH 🐉",
"",
"1 encrypted file detected.",
"",
"love_letter.txt",
"",
"Status : READY"

];let i = 0;

function typeLine(){

    if(i < lines.length){

        terminal.innerHTML += lines[i] + "<br>";

        terminal.scrollTop = terminal.scrollHeight;

        i++;

        setTimeout(typeLine, 350);

    }else{

        const btn = document.createElement("button");

        btn.innerHTML = "🔐 Decrypt File";

        btn.onclick = decryptFile;

        terminal.appendChild(btn);

    }

}

function decryptFile(){

    terminal.classList.add("fade");

    terminal.innerHTML = `
    <div style="text-align:center;padding-top:120px;">
        <h1>🌌</h1>
        <br>
        <h2>Decrypting love_letter.txt...</h2>
        <br>
        <p>Please wait...</p>
    </div>
    `;

    setTimeout(showLetter,2500);

}

function showLetter(){

    terminal.innerHTML = `<div style="max-width:750px;margin:50px auto;padding:30px;color:white;line-height:2;font-size:18px;">

<h1 style="text-align:center;">🦇 To my loving Batman 🖤🦇</h1>

<br>

<p>I know everything feels so hard these days—your exams, the three-wheeler, family problems... it must all feel like too much sometimes. 🫠❤️‍🩹</p>

<br>

<p>But I want you to know that I'm here with you, no matter what, babyy. 🥹🫂 Through better or worse, ups or downs, sickness or health, happiness or sadness, whether you're angry, tired, frustrated, or overwhelmed, I'll always be by your side. 🥰🤍 You've got me, Chuti bbh. 🫂💗</p>

<br>

<p>I believe in you. 😌🤍 I love you, patiyoo. 😘💖 No matter how things turn out, I know my baby gave it his very best, and I'm already so proud of you. 🥳💘</p>

<br>

<p>You are the strongest, most responsible gentleman I know. You're my hero, my 🐲, my batman, my Chuti bbh. 🤗💗 Always. 🖤🤍</p>

<br>

<p>Now go and conquer those exams. I'll be right here, cheering for you every step of the way until I can finally hug you again. 🥹❤️</p>

<br>

<p><strong>With love and lots of kisses, 😚💕💋</strong></p>

<p><strong>Yours, forever ♾️</strong></p>

<h2 style="text-align:right;">Chuti ammi 🐣</h2>

<br><br>

<p style="text-align:center;font-size:14px;opacity:0.7;">
Developed with ❤️ by Catwoman
</p>

</div>
`;
}typeLine();

</script>

</body>
</html>

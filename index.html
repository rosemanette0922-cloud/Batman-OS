<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Batman OS v3.0</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#39ff14;
font-family:Consolas,monospace;
overflow:hidden;
}

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
pointer-events:none;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{
opacity:.2;
transform:scale(1);
}
to{
opacity:1;
transform:scale(2);
}
}

.heart{
position:fixed;
font-size:20px;
animation:floatHeart 8s linear forwards;
pointer-events:none;
z-index:2;
}

@keyframes floatHeart{

0%{
transform:translateY(0) scale(.5);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(1.4);
opacity:0;
}

}

#terminal{
position:relative;
z-index:1;
height:100vh;
overflow-y:auto;
padding:25px;
white-space:pre-wrap;
font-size:17px;
line-height:1.8;
text-shadow:0 0 8px #39ff14;
}

button{

background:#39ff14;
color:black;
border:none;
padding:14px 28px;
border-radius:8px;
font-size:17px;
cursor:pointer;
margin-top:25px;
transition:.3s;

}

button:hover{

transform:scale(1.06);

}

.fade{

animation:fade 1.5s;

}

@keyframes fade{

from{opacity:0;}
to{opacity:1;}

}

.cursor{

animation:blink 1s infinite;

}

@keyframes blink{

50%{
opacity:0;
}

}

#player{
position:fixed;
top:20px;
right:20px;
z-index:999;
}

#musicBtn{
background:black;
color:white;
border:2px solid white;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
font-family:Consolas,monospace;
font-size:15px;
transition:.3s;
}

#musicBtn:hover{
background:white;
color:black;
}
</style>
</head>

<body>

<div id="stars"></div>



<div id="terminal"></div>
<div id="player">
    <button id="musicBtn">🎵 Play Music</button>
</div>


<script>

const terminal=document.getElementById("terminal");
const music = new Audio("PLAZA_-_All_Mine__Official_Audio_(256k).mp3");

music.loop = true;

const musicBtn = document.getElementById("musicBtn");

let playing = false;
const lines=[

let index=0;
    function typeLine(){

    if(index < lines.length){

        terminal.innerHTML += lines[index] + "<br>";

        terminal.scrollTop = terminal.scrollHeight;

        index++;

        setTimeout(typeLine,300);

    }else{

        const btn=document.createElement("button");

        btn.innerHTML="🔐 Decrypt File";

        btn.onclick=function(){

            btn.disabled=true;
            btn.innerHTML="Decrypting...";

            decryptFile();

        };

        terminal.appendChild(btn);

    }

}

function decryptFile(){

    terminal.className="fade";

    terminal.innerHTML=`

    <div style="text-align:center;padding-top:120px;">

    <h1 style="font-size:70px;">🦇</h1>

    <br>

    <h2>Decrypting love_letter.txt...</h2>

    <br>

    <p>Please wait...</p>

    </div>

    `;

    setTimeout(showLetter,2500);

}

function createStars(){

    const stars=document.getElementById("stars");

    stars.innerHTML="";

    for(let i=0;i<150;i++){

        const star=document.createElement("div");

        star.className="star";

        star.style.left=Math.random()*100+"vw";

        star.style.top=Math.random()*100+"vh";

        star.style.animationDelay=Math.random()*2+"s";

        stars.appendChild(star);

    }

}

function createHeart(){

    const heart=document.createElement("div");

    heart.className="heart";

const hearts = ["🖤","🤍"];

heart.innerHTML = hearts[Math.floor(Math.random()*hearts.length)];

    heart.style.left=Math.random()*100+"vw";

    heart.style.bottom="-30px";

    document.body.appendChild(heart);

    setTimeout(function(){

        heart.remove();

    },8000);

    }
    
    function showLetter(){

terminal.innerHTML=`

<div style="max-width:750px;margin:40px auto;padding:30px;color:white;line-height:2;font-size:18px;" class="fade">

<h1 style="text-align:center;">🦇 To my loving Batman 🖤🦇</h1>

</p>

<p>
Now go and conquer those exams. I'll be right here, cheering for you every step of the way until I can finally hug you again. 🥹❤️
</p>

<br>

<h2>With love and lots of kisses, 😚💕💋</h2>

<h3>Yours, forever ♾️</h3>

createStars();

setInterval(createHeart,700);

/* MUSIC
If you have a music file called music.mp3,
uncomment these lines:

const music=new Audio("music.mp3");
music.loop=true;
music.play();

*/

}

createStars();

musicBtn.onclick = function(){

    if(!playing){

        music.play().catch(error => {
    alert(error);
});
        playing = true;

        musicBtn.innerHTML = "⏸ Pause Music";

    }else{

        music.pause();

        playing = false;

        musicBtn.innerHTML = "🎵 Play Music";

    }

};

typeLine();

</script>

</body>
</html>
